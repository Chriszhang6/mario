<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }
        .game-container {
            text-align: center;
            position: relative;
        }
        canvas {
            border: 4px solid #333;
            border-radius: 0;
            box-shadow: 0 0 0 4px #000, 0 0 20px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .controls {
            margin-top: 20px;
            color: #fff;
            font-size: 10px;
            line-height: 1.8;
        }
        .controls p {
            margin: 5px 0;
        }
        .score {
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #000;
        }
        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #c84c0c;
            border: 3px solid #000;
            border-radius: 0;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.1s;
            box-shadow: 3px 3px 0 #000;
        }
        .sound-toggle:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }
        .sound-toggle.muted {
            background: #7c5430;
            opacity: 0.7;
        }
        /* 标题样式 */
        h1 {
            color: #e81800;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #fca040;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <button class="sound-toggle" id="soundToggle" title="开关音效 (M)">🔊</button>
    <div class="game-container">
        <h1>SUPER MARIO BROS</h1>
        <div class="score">MARIO <span id="score">000000</span> | WORLD <span id="world">1-1</span> | LIVES: <span id="lives">3</span></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="controls">
            <p>◄ ► MOVE  |  SPACE JUMP  |  R RESTART  |  M SOUND</p>
            <p>MAKE MARIO GREAT AGAIN</p>
        </div>
    </div>
    <script src="mario.js"></script>
</body>
</html>
